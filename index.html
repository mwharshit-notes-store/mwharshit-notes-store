<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Harshit Notes Store</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:linear-gradient(135deg,#e3f2fd,#ffffff);padding:30px;}
header{text-align:center;margin-bottom:40px;}
header h1{font-size:42px;color:#0d47a1;}
header p{color:#555;margin-top:8px;font-size:18px;}

.container{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap:30px;
}

.card{
  background:white;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  overflow:hidden;
  transition:0.3s;
}
.card:hover{
  transform:translateY(-8px);
  box-shadow:0 15px 30px rgba(0,0,0,0.2);
}

.card img{
  width:100%;
  height:260px;
  object-fit:contain;
  background:#f8f8f8;
  padding:10px;
}
.card-content{padding:20px;text-align:center;}
.price{font-size:20px;font-weight:bold;color:#2e7d32;margin:10px 0;}
button{padding:12px 20px;border:none;background:#1565c0;color:white;border-radius:25px;cursor:pointer;}

footer{text-align:center;margin-top:50px;color:#777;}
</style>
</head>

<body>

<header>
  <h1>Harshit Study Notes PDF Store</h1>
  <p>Printable • Short Notes • Exam Ready</p>
</header>

<div class="container">

  <!-- CARD START -->
<div class="card">
  

  <div class="card-content">
    <h2>Trigonometry Formula Sheet</h2>
    <p>All formulas, table & identities in one place.</p>

    <a href="preview-trigonometry.html">
      <button>Preview</button>
    </a>

    <div class="price">₹19</div>

    <a href="https://imjo.in/82yNtB">
      <button>Buy & Download</button>
    </a>
  </div>
</div>

</div>

<footer>
  © 2026 Harshit Notes | Made for Students
</footer>

</body>
</html>
